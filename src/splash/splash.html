<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DanClaw</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }
  #splash {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    animation: fadeIn 0.8s ease-in;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
  }
  .fade-out { animation: fadeOut 0.5s ease-out forwards; }
  #crab-container svg {
    width: 120px;
    height: 120px;
  }
  #app-name {
    font-size: 48px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #ffffff;
  }
  #tagline-url {
    font-size: 24px;
    color: #4a9eff;
    font-weight: 500;
  }
  #tagline {
    font-size: 14px;
    color: #888888;
    letter-spacing: 1px;
  }
  #version {
    position: fixed;
    bottom: 20px;
    right: 20px;
    font-size: 12px;
    color: #444;
  }
  #loading-dots {
    display: flex;
    gap: 6px;
    margin-top: 10px;
  }
  .dot {
    width: 8px;
    height: 8px;
    background: #4a9eff;
    border-radius: 50%;
    animation: pulse 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>
<div id="splash">
  <div id="crab-container">
    <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="60" cy="62" rx="30" ry="22" fill="#4a9eff"/>
      <ellipse cx="60" cy="58" rx="22" ry="16" fill="#4a9eff"/>
      <circle cx="48" cy="50" r="5" fill="#0a0a0a"/>
      <circle cx="72" cy="50" r="5" fill="#0a0a0a"/>
      <circle cx="49" cy="49" r="2" fill="#fff"/>
      <circle cx="73" cy="49" r="2" fill="#fff"/>
      <path d="M25 55 Q15 45 10 35 Q18 38 22 48 Q28 52 30 58Z" fill="#4a9eff"/>
      <path d="M95 55 Q105 45 110 35 Q102 38 98 48 Q92 52 90 58Z" fill="#4a9eff"/>
      <path d="M30 65 Q18 68 12 78 Q20 75 26 70Z" fill="#4a9eff"/>
      <path d="M90 65 Q102 68 108 78 Q100 75 94 70Z" fill="#4a9eff"/>
      <path d="M38 78 Q34 90 30 98 Q38 90 44 82Z" fill="#4a9eff"/>
      <path d="M82 78 Q86 90 90 98 Q82 90 76 82Z" fill="#4a9eff"/>
      <path d="M50 78 Q48 92 46 100 Q54 90 56 80Z" fill="#4a9eff"/>
      <path d="M70 78 Q72 92 74 100 Q66 90 64 80Z" fill="#4a9eff"/>
      <path d="M46 44 Q42 36 36 30 Q34 38 40 44Z" fill="#4a9eff"/>
      <path d="M74 44 Q78 36 84 30 Q86 38 80 44Z" fill="#4a9eff"/>
    </svg>
  </div>
  <div id="app-name">DanClaw</div>
  <div id="tagline-url">danclaw.ai</div>
  <div id="tagline">Powered by AI. Built for the Road.</div>
  <div id="loading-dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>
<div id="version">v1.0.0</div>
<script>
  fetch('/api/status')
    .then(r => r.json())
    .then(data => {
      if (data.version) {
        document.getElementById('version').textContent = 'v' + data.version;
      }
      setTimeout(function() {
        var splash = document.getElementById('splash');
        splash.classList.add('fade-out');
        setTimeout(function() {
          if (data.setup_complete) {
            window.location.href = '/app';
          } else {
            window.location.href = '/wizard';
          }
        }, 500);
      }, 3000);
    })
    .catch(function() {
      setTimeout(function() {
        var splash = document.getElementById('splash');
        splash.classList.add('fade-out');
        setTimeout(function() {
          window.location.href = '/wizard';
        }, 500);
      }, 3000);
    });
</script>
</body>
</html>
